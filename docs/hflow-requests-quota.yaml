# Manual prerequisite for the Worker Pools execution model.
#
# The Helm charts do NOT create this object — you apply it yourself, once, in
# the namespace where you run the workflow (default: workerpools). The operator's
# PrometheusRules read it (kube_resourcequota, type=hard) to compute the worker
# scaling ceiling.
#
# Before applying: set spec.hard to the TOTAL allocatable cpu/memory of your
# worker nodes (the nodes labelled hyperflow-wms/nodepool: hfworker). The values
# below (21 CPU / 60Gi) are only an example.
#
# The scopeSelector limits this quota to worker pods, which the operator tags
# with priorityClassName: hyperflow-worker. Without it, request-less pods
# (Prometheus, the cert-gen hook) would be rejected and control-plane pods would
# count against the worker ceiling. See docs/worker-pools.md and
# docs/namespace-split-design.md (Option C).
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hflow-requests
  namespace: workerpools
spec:
  hard:
    requests.cpu: "21"
    requests.memory: 60Gi
  scopeSelector:
    matchExpressions:
    - scopeName: PriorityClass
      operator: In
      values: ["hyperflow-worker"]
